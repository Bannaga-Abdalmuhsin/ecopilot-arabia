kind = "web"
previewPath = "/"
title = "Energy Efficiency Advisor"
version = "1.0.0"
id = "artifacts/energy-advisor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24779

[services.development]
run = "pnpm --filter @workspace/energy-advisor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/energy-advisor", "run", "build" ]
serve = "static"
publicDir = "artifacts/energy-advisor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24779"
BASE_PATH = "/"
